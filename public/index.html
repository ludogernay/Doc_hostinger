<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documentation</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      padding: 1.5rem;
      color: #111;
    }

    /* ───── LOGIN OVERLAY ───── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-card {
      background: #fff;
      border-radius: 0.75rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-card h2 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
      color: #111;
    }

    .login-card p {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }

    .login-card input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-card input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    .login-btn {
      width: 100%;
      padding: 0.7rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-btn:hover { background: #2563eb; }

    .login-error {
      margin-top: 0.75rem;
      color: #dc2626;
      font-size: 0.875rem;
      display: none;
    }

    /* ───── APP (masqué jusqu'au login) ───── */
    #app { display: none; }

    header {
      max-width: 64rem;
      margin: 0 auto 1rem;
      background: #fff;
      border-radius: 0.75rem;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #111;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logout-btn {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
    }

    .logout-btn:hover {
      border-color: #dc2626;
      color: #dc2626;
    }

    .card {
      max-width: 64rem;
      margin: 0 auto 1.5rem;
      background: #fff;
      border-radius: 0.75rem;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .list-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .search-input {
      padding: 0.4rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }

    .doc-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      line-height: 1.3;
    }

    .doc-btn:hover { background: #2563eb; }
    .doc-btn:active { transform: scale(0.98); }
    .doc-btn.active { background: #15803d; }

    .no-results {
      color: #6b7280;
      text-align: center;
      grid-column: 1/-1;
      padding: 1rem 0;
    }

    .doc-content {
      max-width: 64rem;
      margin: 0 auto;
      background: #fff;
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .doc-content h2.doc-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2563eb;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 1.25rem;
    }

    .prose { line-height: 1.7; color: #1f2937; }
    .prose h1 { font-size: 1.5rem; font-weight: 700; margin: 1.25rem 0 0.5rem; }
    .prose h2 { font-size: 1.25rem; font-weight: 700; margin: 1.1rem 0 0.4rem; }
    .prose h3 { font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.3rem; }
    .prose p { margin-bottom: 0.75rem; }
    .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .prose li { margin-bottom: 0.25rem; }
    .prose a { color: #2563eb; text-decoration: underline; }
    .prose code { background: #f1f5f9; border-radius: 4px; padding: 1px 5px; font-size: 0.88em; font-family: monospace; }
    .prose pre { background: #1e293b; color: #e2e8f0; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; margin-bottom: 0.75rem; }
    .prose pre code { background: none; color: inherit; padding: 0; }
    .prose blockquote { border-left: 4px solid #3b82f6; padding-left: 1rem; color: #4b5563; margin: 0.75rem 0; }
    .prose table { border-collapse: collapse; width: 100%; margin-bottom: 0.75rem; }
    .prose th, .prose td { border: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; font-size: 0.9rem; }
    .prose th { background: #f9fafb; font-weight: 600; }
    .prose strong { color: #2563eb; font-weight: 600; }
    .prose img { max-width: 100%; height: auto; border-radius: 0.5rem; }

    #content-section { display: none; }
  </style>
</head>
<body>

  <!-- ───── LOGIN OVERLAY ───── -->
  <div id="login-overlay">
    <div class="login-card">
      <h2>🔒 Accès restreint</h2>
      <p>Entrez le mot de passe pour accéder à la documentation.</p>
      <input type="password" id="password-input" placeholder="Mot de passe" />
      <button class="login-btn" id="login-btn">Accéder</button>
      <p class="login-error" id="login-error">❌ Mot de passe incorrect.</p>
    </div>
  </div>

  <!-- ───── APP ───── -->
  <div id="app">
    <header>
      <h1>📖 Documentation</h1>
      <button class="logout-btn" id="logout-btn">🔓 Se déconnecter</button>
    </header>

    <div class="card">
      <div class="list-header">
        <h2>📁 Liste des documents :</h2>
        <input class="search-input" type="text" id="search" placeholder="🔍 Rechercher..." />
      </div>
      <div class="grid" id="doc-grid">
        <p class="no-results">Chargement...</p>
      </div>
    </div>

    <div class="doc-content" id="content-section">
      <h2 class="doc-title" id="doc-title">📄 </h2>
      <div class="prose" id="doc-body"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://doc-app-chnk.onrender.com'; // ← adapte si besoin

    let authHeader = null;
    let allFiles = [];
    let activeFile = null;

    // ───── LOGIN ─────
    async function tryLogin(password) {
      const header = 'Basic ' + btoa('admin:' + password);
      try {
        const res = await fetch(`${API_URL}/api/documentation/files`, {
          headers: { 'Authorization': header }
        });
        if (res.ok) {
          authHeader = header;
          sessionStorage.setItem('authHeader', header);
          showApp();
          return true;
        }
      } catch (e) {}
      return false;
    }

    function showApp() {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadFiles();
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const pwd = document.getElementById('password-input').value;
      const ok = await tryLogin(pwd);
      if (!ok) {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('password-input').value = '';
        document.getElementById('password-input').focus();
      }
    });

    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    // ───── LOGOUT ─────
    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('authHeader');
      authHeader = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('login-overlay').style.display = 'flex';
      document.getElementById('password-input').value = '';
    });

    // ───── AUTO-LOGIN si session existante ─────
    const saved = sessionStorage.getItem('authHeader');
    if (saved) {
      authHeader = saved;
      showApp();
    }

    // ───── API ─────
    async function loadFiles() {
      try {
        const res = await fetch(`${API_URL}/api/documentation/files`, {
          headers: { 'Authorization': authHeader }
        });
        const data = await res.json();
        allFiles = data.filter(f => f !== 'img');
        renderGrid(allFiles);
      } catch (e) {
        document.getElementById('doc-grid').innerHTML = '<p class="no-results">Erreur lors du chargement des documents.</p>';
      }
    }

    function renderGrid(files) {
      const grid = document.getElementById('doc-grid');
      if (!files.length) {
        grid.innerHTML = '<p class="no-results">Aucun document trouvé.</p>';
        return;
      }
      grid.innerHTML = files.map(f => `
        <button class="doc-btn ${f === activeFile ? 'active' : ''}" onclick="loadDoc('${f}')">${f}</button>
      `).join('');
    }

    async function loadDoc(filename) {
      activeFile = filename;
      renderGrid(document.getElementById('search').value
        ? allFiles.filter(f => f.toLowerCase().includes(document.getElementById('search').value.toLowerCase()))
        : allFiles);

      try {
        const res = await fetch(`${API_URL}/api/documentation/${encodeURIComponent(filename)}`, {
          headers: { 'Authorization': authHeader }
        });
        const text = await res.text();

        document.getElementById('doc-title').innerHTML = `📄 ${filename}`;
        document.getElementById('doc-body').innerHTML = marked.parse(text);
        const section = document.getElementById('content-section');
        section.style.display = 'block';
        setTimeout(() => {
          section.scrollIntoView({ behavior: 'smooth', block: 'start' });
          window.scrollBy({ top: -20, behavior: 'smooth' });
        }, 100);
      } catch (e) {
        document.getElementById('doc-body').innerHTML = '<p>Erreur lors du chargement du document.</p>';
      }
    }

    document.getElementById('search').addEventListener('input', e => {
      const val = e.target.value.toLowerCase();
      renderGrid(val ? allFiles.filter(f => f.toLowerCase().includes(val)) : allFiles);
    });
  </script>
</body>
</html>
